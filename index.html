<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Manager</title>
    <!-- google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- bootstrap cdn-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- custom css file -->
    <link rel="stylesheet" href="./main.css">
</head>
<body>

    <!-- Header -->
    <header class="p-4 bg-black">
        <h1 class="ms-4 text-white fs-2">Courses</h1>
    </header>

    <!-- Form Section -->
    <section class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="bg-white border rounded-4 p-4 shadow-sm">
                    <p class="form-title fs-4 mb-1 text-center">New Course</p>
                    <p class="text-muted mb-3 small text-center">Fill in the details below to publish a course.</p>
                    <hr class="my-4 w-50 mx-auto border-2 opacity-25">
                    <form>
                        <div class="mb-3">
                            <label for="title" class="form-label fw-medium small">Course Title</label>
                            <input type="text" class="form-control" id="title" placeholder="e.g. Intro to JavaScript">
                        </div>
                        <div class="mb-3">
                            <label for="price" class="form-label fw-medium small">Price (LE)</label>
                            <input type="number" class="form-control" id="price" placeholder="e.g. 1500">
                        </div>
                        <div class="mb-3">
                            <label for="instructor" class="form-label fw-medium small">Instructor</label>
                            <input type="text" class="form-control" id="instructor" placeholder="e.g. Ahmed Hassan">
                        </div>
                        <div class="mb-3">
                            <label for="desc" class="form-label fw-medium small">Description</label>
                            <textarea class="form-control" id="desc" rows="3" placeholder="What will students learn?"></textarea>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-dark flex-grow-1 py-2 rounded-3" id="submitBtn">+ Add Course</button>
                            <button type="button" class="btn btn-outline-primary flex-grow-1 py-2 rounded-3" id="updateBtn" disabled>Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Table Section -->
    <section class="container my-5">
        <div class="mb-3 px-1">
            <h2 class="section-title fs-2">All Courses</h2>
        </div>
        <div class="table-responsive rounded-4 shadow-sm">
            <table class="table table-hover text-center mb-0">
                <thead>
                    <tr>
                        <th scope="col" class="bg-black text-white text-uppercase px-3 py-3">Title</th>
                        <th scope="col" class="bg-black text-white text-uppercase px-3 py-3">Price</th>
                        <th scope="col" class="bg-black text-white text-uppercase px-3 py-3">Instructor</th>
                        <th scope="col" class="bg-black text-white text-uppercase px-3 py-3">Description</th>
                        <th scope="col" class="bg-black text-white text-uppercase px-3 py-3">Delete</th>
                        <th scope="col" class="bg-black text-white text-uppercase px-3 py-3">Edit</th>
                    </tr>
                </thead>
                <tbody>

                </tbody>
            </table>
        </div>
    </section>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Bootstrap cdn-->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <!-- js custom file -->
    <script src="./main.js"></script>
</body>
</html>
